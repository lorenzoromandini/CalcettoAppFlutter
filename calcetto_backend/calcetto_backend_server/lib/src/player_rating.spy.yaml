class: PlayerRating
table: player_ratings
fields:
  id: UuidValue?, defaultPersist=random_v7
  matchId: UuidValue, relation(parent=matches)
  clubMemberId: UuidValue, relation(parent=club_members)
  rating: double
  ratingPreCaps: double?
  bonusMinusMalus: double?
  mvp: bool, default=false
  mention: int, default=0
  comment: String?
  createdAt: DateTime, default=now
  updatedAt: DateTime, default=now
indexes:
  player_ratings_match_id_idx:
    fields: matchId
  player_ratings_club_member_id_idx:
    fields: clubMemberId
  player_ratings_unique:
    fields: matchId, clubMemberId
    unique: true