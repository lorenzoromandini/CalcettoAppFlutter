class: User
table: users
fields:
  id: UuidValue?, defaultPersist=random_v7
  email: String
  firstName: String
  lastName: String
  nickname: String?
  imageUrl: String?
  password: String
  createdAt: DateTime, default=now
  updatedAt: DateTime, default=now
  lastLogin: DateTime?
indexes:
  users_email_idx:
    fields: email
    unique: true