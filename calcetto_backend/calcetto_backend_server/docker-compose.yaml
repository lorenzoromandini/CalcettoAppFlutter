services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: calcetto_backend
      POSTGRES_PASSWORD: "_C-GsCPBdUYslYAbPG5iXqNgPGGmV4_g"
    volumes:
      - calcetto_backend_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "7YoOh8X2yKTU8vXMhPPPCIzjeYmGbG59"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: calcetto_backend_test
      POSTGRES_PASSWORD: "zMyTZzx24EDoYgNG6AatQeQIQifWE79Y"
    volumes:
      - calcetto_backend_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "mJbwh3n_8a0ND2In-bLS3AsWQTODo69-"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  calcetto_backend_data:
  calcetto_backend_test_data:
